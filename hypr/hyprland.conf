# This file sources other files in `hyprland` and `custom` folders
# You wanna add your stuff in files in `custom`

# Source the submap settings dynamically based on active shell
source = ~/.config/hypr/config/submap.conf

# Defaults
source = ~/.config/hypr/hyprland/env.conf
source = ~/.config/hypr/hyprland/execs.conf
source = ~/.config/hypr/hyprland/general.conf
source = ~/.config/hypr/hyprland/rules.conf
source = ~/.config/hypr/hyprland/colors.conf
source = ~/.config/hypr/hyprland/keybinds.conf

# Custom 
source = ~/.config/hypr/custom/env.conf
source = ~/.config/hypr/custom/execs.conf
source = ~/.config/hypr/custom/general.conf
source = ~/.config/hypr/custom/rules.conf
source = ~/.config/hypr/custom/keybinds.conf

# nwg-displays support
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/monitors.conf

# Define toggle shell keybind under the active submap
bind = SUPER SHIFT, X, exec, ~/.config/hypr/scripts/toggle_shell.sh

# Extra variables and overrides
cursor {
    no_warps = true
}
windowrule = match:class ^(Looking-glass-client)$, float on, size 1920 1080, center on

# Sourced shell-specific autostarts/layer rules/keybindings
source = ~/.config/hypr/config/shell.conf
