# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ QUICKSHELL CONFIGURATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Autostarts
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Main.qml
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Floating.qml
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Shell.qml
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py &
exec-once = ~/.config/hypr/scripts/quickshell/focustime/launch_daemon.sh
exec-once = ~/.config/hypr/scripts/settings_watcher.sh &

# Workspaces — Switch
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10

# Workspaces — Move Window + Follow
bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1 move
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2 move
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3 move
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4 move
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5 move
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6 move
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7 move
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8 move
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9 move
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10 move

# Workspace Navigation
bind = $mainMod, Tab, exec, ~/.config/hypr/scripts/qs_manager.sh previous

# Quickshell Widgets
bind = $mainMod, D, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle applauncher
bindd = $mainMod, B, Toggle bar, global, quickshell:barToggle
bind = $mainMod SHIFT, M, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music
bind = $mainMod SHIFT, W, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
bind = $mainMod SHIFT, B, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle battery
bind = $mainMod, V, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle clipboard
bind = $mainMod SHIFT, V, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle volume
bind = $mainMod, N, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle network
bind = $mainMod, S, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle calendar
bind = $mainMod, M, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle monitors
bind = $mainMod, P, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle movies
bind = $mainMod SHIFT, S, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle settings
bind = $mainMod SHIFT, T, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bind = $mainMod, Slash, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle guide
bind = $mainMod, A, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle stewart
