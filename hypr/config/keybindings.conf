# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ KEYBINDINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ───────── Mouse & Gestures ─────────
gesture = 3, horizontal, workspace
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Mouse wheel left/right to change workspace
bind = $mainMod, mouse_left, workspace, e-1
bind = $mainMod, mouse_right, workspace, e+1

# ───────── Window Management ─────────
bind = $mainMod, Q, killactive,
bind = ALT, F4, killactive,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, togglefloating,

# ───────── Focus — Arrows ─────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ───────── Focus — Vim (HJKL) ─────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ───────── Resize — Win+Shift+Arrows ─────────
binde = $mainMod SHIFT, left, resizeactive, -50 0
binde = $mainMod SHIFT, right, resizeactive, 50 0
binde = $mainMod SHIFT, up, resizeactive, 0 -50
binde = $mainMod SHIFT, down, resizeactive, 0 50

# ───────── Resize — Win+Shift+HJKL ─────────
binde = $mainMod SHIFT, H, resizeactive, -50 0
binde = $mainMod SHIFT, L, resizeactive, 50 0
binde = $mainMod SHIFT, K, resizeactive, 0 -50
binde = $mainMod SHIFT, J, resizeactive, 0 50

# ───────── Move Window — Win+Ctrl+Arrows ─────────
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# ───────── Move Window — Win+Ctrl+HJKL ─────────
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# ───────── Workspaces — Switch (via qs_manager) ─────────
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10

# ───────── Workspaces — Move Window + Follow (via qs_manager) ─────────
bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1 move
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2 move
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3 move
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4 move
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5 move
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6 move
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7 move
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8 move
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9 move
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10 move

# ───────── Workspaces — Move Window Silently ─────────
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# ───────── Workspace Navigation ─────────
bind = $mainMod, Tab, workspace, previous
bind = ALT, Tab, cyclenext,
bind = ALT SHIFT, Tab, cyclenext, prev

# ───────── Special Workspace ─────────
bind = $mainMod, U, togglespecialworkspace,
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod CTRL, U, movetoworkspacesilent, special

# ───────── Applications ─────────
bind = $mainMod, W, exec, zen-browser
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, nautilus
bind = $mainMod SHIFT, Return, exec, pypr toggle term

# ───────── Quickshell Widgets ─────────
bind = $mainMod, D, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle applauncher
bindd = $mainMod, B, Toggle bar, global, quickshell:barToggle
bind = $mainMod SHIFT, M, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music
bind = $mainMod SHIFT, W, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
bind = $mainMod SHIFT, B, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle battery
bind = $mainMod, C, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle clipboard
bind = $mainMod, V, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle volume
bind = $mainMod, N, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle network
bind = $mainMod, S, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle calendar
bind = $mainMod, M, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle monitors
bind = $mainMod, P, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle movies
bind = $mainMod SHIFT, S, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle settings
bind = $mainMod SHIFT, T, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bind = $mainMod, Slash, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle guide
bind = $mainMod, R, exec, bash ~/.config/hypr/scripts/reload.sh

# ───────── System ─────────
bindl = $mainMod, Space, exec, playerctl play-pause
bind = CTRL ALT, L, exec, bash ~/.config/hypr/scripts/lock.sh
bindl = , XF86PowerOff, exec, bash ~/.config/hypr/scripts/lock.sh

# ───────── Media & Hardware Keys ─────────
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , xf86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , xf86audiomute, exec, swayosd-client --output-volume mute-toggle
bindel = , xf86audiolowervolume, exec, swayosd-client --output-volume lower
bindel = , xf86audioraisevolume, exec, swayosd-client --output-volume raise
bindl = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise

# ───────── Screenshots ─────────
bindl = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bindl = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh --edit
bindl = SUPER, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full
bindl = SUPER SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full --edit
