# Win+Alt+U -> UGFzc3dvcmQ/MQ==
bind = $mainMod ALT, U, exec, ~/.config/hypr/scripts/type_text.sh "UGFzc3dvcmQ/MQ=="

# Win+Alt+N -> N1FFTHhDdQ==
