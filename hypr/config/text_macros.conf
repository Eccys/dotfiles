# Win+Alt+E -> rioisthebestiloverio@gmail.com
bind = $mainMod ALT, E, exec, ~/.config/hypr/scripts/type_text.sh "rioisthebestiloverio@gmail.com"

# Win+Alt+P -> Password?1
